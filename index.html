<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <title>Snooker Scoreboard - Offline Version</title>
    
    <script src="confetti.js"></script>
    
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</head>
<body onclick="handleFirstClick()">

    <div id="celebration-overlay">
        <div id="celebration-text" class="celebration-text"></div>
    </div>

    <div class="main-container">
        <div class="game-display">
            <div id="p1-area" class="player-side active">
                <div class="name-row">
                    <div class="name" onclick="openPlayerModal(0)" id="p1-name">Player 1</div>
                    <div class="frame-count" id="p1-frames">0</div>
                </div>
                <div id="p1-score" class="score">0</div>
                <div class="foul-label">Foul Given: <span id="p1-foul-given">0</span></div>
            </div>

            <div class="center-info">
                <button onclick="showResetModal()" class="reset-btn-ui">RESET MATCH</button>
                <div id="timer">00:00</div>
                <div id="vs-text">VS</div>
                <div class="diff-box">
                    <div class="diff-label">DIFF</div>
                    <div id="score-diff">0</div>
                </div>
                <div class="change-player">
                    <button class="modal-btn btn-blue" onclick="handleSwitch(this)">Change Player <div>(Enter)</div></button>
                </div>
                
            </div>

            <div id="p2-area" class="player-side">
                <div class="name-row">
                    <div class="frame-count" id="p2-frames">0</div>
                    <div class="name" onclick="openPlayerModal(1)" id="p2-name">Player 2</div>
                </div>
                <div id="p2-score" class="score">0</div>
                <div class="foul-label">Foul Given: <span id="p2-foul-given">0</span></div>
            </div>
        </div>

        <div id="break-container">
            <div id="break-area"></div>
            <div id="break-balls"></div>
        </div>
        <div class="controls">
            <div class="ball-row">
                <button class="ball-sphere ball-control color-1" onclick="addScore(1, this)"><span>1</span></button>
                <button class="ball-sphere ball-control color-2" onclick="addScore(2, this)"><span>2</span></button>
                <button class="ball-sphere ball-control color-3" onclick="addScore(3, this)"><span>3</span></button>
                <button class="ball-sphere ball-control color-4" onclick="addScore(4, this)"><span>4</span></button>
                <button class="ball-sphere ball-control color-5" onclick="addScore(5, this)"><span>5</span></button>
                <button class="ball-sphere ball-control color-6" onclick="addScore(6, this)"><span>6</span></button>
                <button class="ball-sphere ball-control color-7" onclick="addScore(7, this)"><span>7</span></button>
               
                <button class="ball-sphere ball-control foul-ball4" onclick="foul(4, this)"><span>F4</span> (/)</button>
                <button class="ball-sphere ball-control foul-ball5" onclick="foul(5, this)"><span>F5</span> (*)</button>
                <button class="ball-sphere ball-control foul-ball6" onclick="foul(6, this)"><span>F6</span> (-)</button>
                <button class="ball-sphere ball-control foul-ball7" onclick="foul(7, this)"><span>F7</span> (+)</button>

            </div>
            
          
            
            <div class="system-row">
                <button class="modal-btn btn-dark" onclick="handleUndo(this)">Undo (back space)</button>
                <button class="modal-btn btn-dark" onclick="exportDetailedLog(this)">Log Export</button>
                <button class="modal-btn btn-dark" onclick="showConcedeModal(this)">Finish Frame ( . )</button>
            </div>
        </div>
        <div id="ad-space" class="ad-placeholder">
            <p>Advertisement</p>
        </div>
    </div>

    <div id="player-modal" class="modal">
        <div class="modal-content">
            <h3>Player Select</h3>
            <input type="file" id="csv-file-input" style="display:none" accept=".csv">
            <button class="modal-btn btn-purple" onclick="document.getElementById('csv-file-input').click()">CSV Load</button>
            <div id="modal-player-list" class="player-list-scroll"></div>
            <div class="flex-column">
                <button class="modal-btn btn-dark" onclick="openManualInputModal()">Manual Input</button>
                <button class="modal-btn btn-gray" onclick="closeModal('player-modal')">Close</button>
            </div>
        </div>
    </div>

    <div id="manual-input-modal" class="modal">
        <div class="modal-content">
            <h3>Enter Name</h3>
            <input type="text" id="manual-name-field" class="name-text-input">
            <div class="flex-row">
                <button class="modal-btn btn-green" onclick="submitManualName()">OK</button>
                <button class="modal-btn btn-gray" onclick="closeModal('manual-input-modal')">Cancel</button>
            </div>
        </div>
    </div>

    <div id="concede-modal" class="modal">
        <div class="modal-content">
            <h2>Frame Result</h2>
            <p id="concede-text" class="msg-large"></p>
            <div class="flex-row">
                <button class="modal-btn btn-green" onclick="finalizeConcede()">OK</button>
                <button class="modal-btn btn-red" onclick="closeModal('concede-modal')">NO</button>
            </div>
        </div>
    </div>
    <div id="black-ball-modal" class="modal">
        <div class="modal-content"><h2>Black Ball Game Winner?</h2><div class="flex-row"><button id="bb-p1-btn" class="modal-btn btn-green" onclick="finalizeFrame(0, 'BLACK BALL')"></button><button id="bb-p2-btn" class="modal-btn btn-green" onclick="finalizeFrame(1, 'BLACK BALL')"></button></div></div>
    </div>
    <div id="reset-modal" class="modal">
        <div class="modal-content">
            <h2>Reset Match?</h2>
            <p class="txt-gray">Log data will be KEPT.</p>
            <div class="flex-column">
            <button class="modal-btn btn-red" onclick="finalizeReset()">RESET</button>
            <button class="modal-btn btn-gray" onclick="closeModal('reset-modal')">Cancel</button>
            </div>
        </div>
    </div>
    <div id="secret-modal" class="modal">
        <div class="modal-content secret-box"><div class="secret-msg">Thank you for using this App.</div><div class="secret-name">JIRO</div><button class="modal-btn btn-green" onclick="closeModal('secret-modal')">Close</button></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
